<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Indicadores Operacionais</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f5f3ff;color:#1e293b}
header{background:#7c3aed;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:1.1rem}
.badge-role{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:12px;font-size:.8rem;margin-left:8px}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.88rem}
.btn-outline{background:transparent;border:1px solid #fff;color:#fff}
.btn-primary{background:#7c3aed;color:#fff;font-weight:600}
.btn-primary:hover{background:#6d28d9}
.btn-sm{padding:4px 10px;font-size:.8rem;background:#7c3aed;color:#fff;border:none;border-radius:5px;cursor:pointer}
.container{max-width:1000px;margin:0 auto;padding:20px 16px}
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid #e2e8f0;overflow-x:auto}
.tab{padding:9px 18px;cursor:pointer;border:none;background:none;font-size:.9rem;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap}
.tab.active{color:#7c3aed;border-bottom-color:#7c3aed;font-weight:600}
.section{display:none}.section.active{display:block}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:18px;margin-bottom:14px}
.card h2{font-size:.85rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
label{display:block;font-size:.83rem;color:#374151;margin-bottom:3px;margin-top:10px}
input,select,textarea{width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:.9rem;outline:none}
input:focus,select:focus,textarea:focus{border-color:#7c3aed}
textarea{resize:vertical;min-height:70px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:12px}
.ind-item{background:#f8f5ff;border:1.5px solid #e9d5ff;border-radius:8px;padding:12px}
.ind-item label{color:#5b21b6;font-weight:600;margin-top:0}
.ind-item input{background:#fff}
.msg{margin-top:12px;padding:10px 14px;border-radius:7px;font-size:.85rem;display:none}
.msg.ok{background:#d1fae5;color:#065f46;display:block}
.msg.err{background:#fee2e2;color:#991b1b;display:block}
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-top:12px}
.comp-item{background:#f5f3ff;border:1.5px solid #ddd6fe;border-radius:8px;padding:12px}
.comp-item label{color:#5b21b6;font-weight:600;font-size:.83rem;margin-top:0;margin-bottom:6px}
.stars{display:flex;gap:4px;margin-top:4px}
.star{font-size:1.4rem;cursor:pointer;color:#d1d5db}
.star.on{color:#7c3aed}
table{width:100%;border-collapse:collapse;font-size:.85rem}
th{background:#f5f3ff;padding:8px 10px;text-align:left;font-size:.78rem;color:#64748b;text-transform:uppercase;border-bottom:2px solid #e9d5ff}
td{padding:8px 10px;border-bottom:1px solid #f1f5f9}
</style>
</head>
<body>
<header>
<h1>Indicadores Operacionais <span class="badge-role">Analista Op.</span></h1>
<button class="btn btn-outline" onclick="sair()">Sair</button>
</header>
<div class="container">
<div class="tabs">
<button class="tab active" onclick="aba('autoaval',this)">Minha Autoavaliacao</button>
<button class="tab" onclick="aba('individual',this)">Lancar Individual</button>
<button class="tab" onclick="aba('coletivo',this)">Lancar Coletivo</button>
<button class="tab" onclick="aba('historico',this)">Historico</button>
</div>

<!-- ABA: MINHA AUTOAVALIACAO -->
<div id="autoaval" class="section active">
<div class="card">
<h2>Minha Autoavaliacao de Competencias</h2>
<div class="form-row">
<div><label>Periodo</label><input type="month" id="avPeriodo"/></div>
<div><label>Comentario (opcional)</label><input type="text" id="avComentario" placeholder="Algo sobre este periodo..."/></div>
</div>
<div class="comp-grid" id="compGrid"></div>
<button class="btn btn-primary" style="margin-top:16px" onclick="enviarAutoaval()">Enviar Autoavaliacao</button>
<div class="msg" id="msgAutoaval"></div>
</div>
</div>

<!-- ABA: LANCAMENTO INDIVIDUAL -->
<div id="individual" class="section">
<div class="card">
<h2>Lancar Indicadores - Por Colaborador</h2>
<div class="form-row-3">
<div><label>Mes de referencia</label><input type="month" id="indMes"/></div>
<div><label>Colaborador</label>
<select id="indColaborador"><option value="">Selecione...</option></select></div>
<div><label>Equipe</label>
<select id="indEquipe"><option value="Cond21">Cond21</option><option value="GC">GC</option></select></div>
</div>
<div class="ind-grid">
<div class="ind-item"><label>Ligacoes / Zoho</label><input type="number" id="i_ligacoes" min="0" placeholder="0"/></div>
<div class="ind-item"><label>Tickets Blip</label><input type="number" id="i_tickets" min="0" placeholder="0"/></div>
<div class="ind-item"><label>CSAT Blip (0-5)</label><input type="number" id="i_csat_blip" step="0.01" min="0" max="5" placeholder="0.00"/></div>
<div class="ind-item"><label>Taxa de Resposta (%)</label><input type="number" id="i_taxa" step="0.01" min="0" max="100" placeholder="0.00"/></div>
<div class="ind-item"><label>Detratores</label><input type="number" id="i_detratores" min="0" placeholder="0"/></div>
<div class="ind-item"><label>TM 1 Resposta (hh:mm)</label><input type="text" id="i_tm1r" placeholder="00:05"/></div>
<div class="ind-item"><label>TME (hh:mm)</label><input type="text" id="i_tme" placeholder="00:11"/></div>
<div class="ind-item"><label>TMR (hh:mm)</label><input type="text" id="i_tmr" placeholder="00:06"/></div>
<div class="ind-item"><label>TMA (hh:mm)</label><input type="text" id="i_tma" placeholder="01:08"/></div>
<div class="ind-item"><label>TME Telefone (hh:mm)</label><input type="text" id="i_tme_tel" placeholder="00:00"/></div>
<div class="ind-item"><label>TMA Telefone (hh:mm)</label><input type="text" id="i_tma_tel" placeholder="00:00"/></div>
<div class="ind-item"><label>CSAT Telefone (0-5)</label><input type="number" id="i_csat_tel" step="0.01" min="0" max="5" placeholder="0.00"/></div>
<div class="ind-item"><label>Indicacoes</label><input type="number" id="i_indicacoes" min="0" placeholder="0"/></div>
</div>
<div style="margin-top:12px"><label>Observacoes</label><textarea id="i_obs" placeholder="Observacoes sobre o periodo..."></textarea></div>
<button class="btn btn-primary" style="margin-top:14px" onclick="salvarIndividual()">Salvar Indicadores</button>
<div class="msg" id="msgInd"></div>
</div>
</div>

<!-- ABA: LANCAMENTO COLETIVO -->
<div id="coletivo" class="section">
<div class="card">
<h2>Lancar Indicadores - Todos da Equipe</h2>
<div class="form-row">
<div><label>Mes de referencia</label><input type="month" id="colMes"/></div>
<div><label>Equipe</label>
<select id="colEquipe" onchange="carregarTabelaColetiva()">
<option value="Cond21">Cond21</option>
<option value="GC">GC</option>
<option value="Ambas">Ambas</option>
</select></div>
</div>
<div style="margin-top:14px;overflow-x:auto" id="tabelaColetiva">
<p style="color:#94a3b8;font-size:.9rem">Selecione o mes e equipe para carregar a tabela.</p>
</div>
<button class="btn btn-primary" style="margin-top:14px" onclick="salvarColetivo()">Salvar Todos</button>
<div class="msg" id="msgCol"></div>
</div>
</div>

<!-- ABA: HISTORICO -->
<div id="historico" class="section">
<div class="card">
<h2>Historico de Lancamentos</h2>
<div class="form-row" style="margin-bottom:14px">
<div><label>Filtrar por mes</label><input type="month" id="filtMes" onchange="carregarHistorico()"/></div>
<div><label>Filtrar por equipe</label>
<select id="filtEquipe" onchange="carregarHistorico()">
<option value="">Todas</option><option value="Cond21">Cond21</option><option value="GC">GC</option>
</select></div>
</div>
<div id="tabelaHist"><p style="color:#94a3b8">Selecione um mes para ver o historico.</p></div>
</div>
</div>
</div>

<script>
const SURL='https://zsfysyphhpsajxbkwywk.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZnlzeXBoaHBzYWp4Ymt3eXdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNDk3MTIsImV4cCI6MjA5NzgyNTcxMn0.wkfGIhB0YxN-VM_m1s7N1d-HIg2uK9C1FFBDmvcYfL0';
const sb=supabase.createClient(SURL,SKEY);

const COMPETENCIAS=['C1 - Conhecimento tecnico','C2 - Comunicacao','C3 - Resolucao de problemas','C4 - Proatividade','C5 - Trabalho em equipe','C6 - Organizacao','C7 - Adaptabilidade','C8 - Foco no cliente'];
const CAMPOS_IND=['ligacoes_zoho','tickets_blip','csat_blip','taxa_resposta','detratores','tm_primeira_resposta','tme','tmr','tma','tme_telefone','tma_telefone','csat_telefone','indicacoes'];
const IDS_IND=['i_ligacoes','i_tickets','i_csat_blip','i_taxa','i_detratores','i_tm1r','i_tme','i_tmr','i_tma','i_tme_tel','i_tma_tel','i_csat_tel','i_indicacoes'];
const LABELS_IND=['Lig/Zoho','Tickets','CSAT Blip','Taxa Resp%','Detratores','TM1Resp','TME','TMR','TMA','TME-Tel','TMA-Tel','CSAT-Tel','Indicacoes'];

let meusColaboradores=[];
let meuEmail='';

function aba(nome,el){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(nome).classList.add('active');
  el.classList.add('active');
}

function showMsg(id,txt,tipo){const m=document.getElementById(id);m.textContent=txt;m.className='msg '+tipo;}

// Autoavaliacao
function criarEstrelas(compIdx){
  const div=document.createElement('div');
  div.className='comp-item';
  div.innerHTML='<label>'+COMPETENCIAS[compIdx]+'</label><div class="stars" id="stars_'+compIdx+'">'+
    [1,2,3,4,5].map(n=>'<span class="star" onclick="setStar('+compIdx+','+n+')" id="s'+compIdx+'_'+n+'">★</span>').join('')+
  '</div>';
  return div;
}

function setStar(comp,val){
  window._notas=window._notas||{};
  window._notas[comp]=val;
  [1,2,3,4,5].forEach(n=>{
    const s=document.getElementById('s'+comp+'_'+n);
    s.className='star'+(n<=val?' on':'');
  });
}

async function enviarAutoaval(){
  const periodo=document.getElementById('avPeriodo').value;
  const comentario=document.getElementById('avComentario').value;
  if(!periodo){showMsg('msgAutoaval','Selecione o periodo.','err');return;}
  const notas=window._notas||{};
  const data={periodo,comentario,colaborador_id:window._myId};
  COMPETENCIAS.forEach((_,i)=>data['nota_c'+(i+1)]=notas[i]||0);
  const{error}=await sb.from('autoavaliacoes').upsert(data,{onConflict:'colaborador_id,periodo'});
  if(error)showMsg('msgAutoaval','Erro: '+error.message,'err');
  else showMsg('msgAutoaval','Autoavaliacao enviada!','ok');
}

// Individual
function coletarDadosInd(){
  const obj={};
  CAMPOS_IND.forEach((campo,i)=>{const v=document.getElementById(IDS_IND[i]).value;if(v)obj[campo]=v;});
  obj.observacoes=document.getElementById('i_obs').value;
  return obj;
}

async function salvarIndividual(){
  const mes=document.getElementById('indMes').value;
  const colId=document.getElementById('indColaborador').value;
  const equipe=document.getElementById('indEquipe').value;
  if(!mes||!colId){showMsg('msgInd','Selecione mes e colaborador.','err');return;}
  const col=meusColaboradores.find(c=>c.id===colId);
  if(!col){showMsg('msgInd','Colaborador nao encontrado.','err');return;}
  const dados={analista_email:col.email,analista_nome:col.nome,mes,equipe,nivel:col.papel,...coletarDadosInd(),criado_por:window._myId};
  const{error}=await sb.from('indicadores').upsert(dados,{onConflict:'analista_email,mes,equipe'});
  if(error)showMsg('msgInd','Erro: '+error.message,'err');
  else showMsg('msgInd','Indicadores salvos!','ok');
}

// Coletivo
async function carregarTabelaColetiva(){
  const equipe=document.getElementById('colEquipe').value;
  let q=sb.from('perfis').select('*').in('papel',['n1','n2']).order('nome');
  if(equipe!=='Ambas')q=q.or('equipe.eq.'+equipe+',equipe.eq.Ambas');
  const{data}=await q;
  const div=document.getElementById('tabelaColetiva');
  if(!data||!data.length){div.innerHTML='<p style="color:#94a3b8">Nenhum colaborador nesta equipe.</p>';return;}
  div.innerHTML='<table><thead><tr><th>Colaborador</th>'+LABELS_IND.map(l=>'<th>'+l+'</th>').join('')+'</tr></thead><tbody>'+
    data.map(m=>'<tr><td><strong>'+m.nome+'</strong></td>'+CAMPOS_IND.map((c,i)=>'<td><input type="'+(c.includes('tm')?'text':'number')+'" style="width:70px;padding:4px" id="col_'+m.id+'_'+c+'" placeholder="0"></td>').join('')+'</tr>').join('')+
  '</tbody></table>';
  window._coletivoCols=data;
}

async function salvarColetivo(){
  const mes=document.getElementById('colMes').value;
  const equipe=document.getElementById('colEquipe').value;
  if(!mes){showMsg('msgCol','Selecione o mes.','err');return;}
  if(!window._coletivoCols){showMsg('msgCol','Carregue a tabela primeiro.','err');return;}
  const rows=window._coletivoCols.map(m=>{
    const obj={analista_email:m.email,analista_nome:m.nome,mes,equipe:equipe==='Ambas'?m.equipe:equipe,nivel:m.papel,criado_por:window._myId};
    CAMPOS_IND.forEach(c=>{const el=document.getElementById('col_'+m.id+'_'+c);if(el&&el.value)obj[c]=el.value;});
    return obj;
  });
  const{error}=await sb.from('indicadores').upsert(rows,{onConflict:'analista_email,mes,equipe'});
  if(error)showMsg('msgCol','Erro: '+error.message,'err');
  else showMsg('msgCol','Todos os indicadores salvos!','ok');
}

// Historico
async function carregarHistorico(){
  const mes=document.getElementById('filtMes').value;
  const equipe=document.getElementById('filtEquipe').value;
  if(!mes)return;
  let q=sb.from('indicadores').select('*').eq('mes',mes).order('analista_nome');
  if(equipe)q=q.eq('equipe',equipe);
  const{data,error}=await q;
  const div=document.getElementById('tabelaHist');
  if(error||!data||!data.length){div.innerHTML='<p style="color:#94a3b8">Nenhum registro encontrado.</p>';return;}
  div.innerHTML='<div style="overflow-x:auto"><table><thead><tr><th>Nome</th><th>Equipe</th><th>Nivel</th>'+LABELS_IND.map(l=>'<th>'+l+'</th>').join('')+'</tr></thead><tbody>'+
    data.map(r=>'<tr><td>'+r.analista_nome+'</td><td>'+r.equipe+'</td><td>'+r.nivel+'</td>'+CAMPOS_IND.map(c=>'<td>'+(r[c]||'-')+'</td>').join('')+'</tr>').join('')+
  '</tbody></table></div>';
}

async function sair(){await sb.auth.signOut();location.href='index.html';}

async function init(){
  const{data:{session}}=await sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  window._myId=session.user.id;
  meuEmail=session.user.email;
  
  // Carregar colaboradores para dropdown individual
  const{data:cols}=await sb.from('perfis').select('*').in('papel',['n1','n2']).order('nome');
  meusColaboradores=cols||[];
  const sel=document.getElementById('indColaborador');
  meusColaboradores.forEach(c=>{const o=document.createElement('option');o.value=c.id;o.textContent=c.nome+' ('+c.equipe+')';sel.appendChild(o);});
  
  // Criar grid de competencias
  const grid=document.getElementById('compGrid');
  window._notas={};
  COMPETENCIAS.forEach((_,i)=>grid.appendChild(criarEstrelas(i)));
  
  // Definir mes atual
  const hoje=new Date();
  const mesAtual=hoje.getFullYear()+'-'+(String(hoje.getMonth()+1).padStart(2,'0'));
  ['avPeriodo','indMes','colMes','filtMes'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=mesAtual;});
}
init();
</script>
</body>
  </html>
