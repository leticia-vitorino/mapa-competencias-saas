<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Indicadores Operacionais</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b}
header{background:#7c3aed;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:1.1rem}
.badge-role{background:rgba(255,255,255,.2);padding:3px 10px;border-radius:12px;font-size:.78rem;margin-left:10px}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.88rem}
.btn-outline{background:transparent;border:1px solid #fff;color:#fff}
.btn-primary{background:#7c3aed;color:#fff;font-weight:600}
.btn-primary:hover{background:#6d28d9}
.container{max-width:1100px;margin:0 auto;padding:20px 16px}
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid #e2e8f0}
.tab{padding:9px 18px;cursor:pointer;border:none;background:none;font-size:.9rem;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:#7c3aed;border-bottom-color:#7c3aed;font-weight:600}
.section{display:none}.section.active{display:block}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:18px;margin-bottom:14px}
.card h2{font-size:.85rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:14px}
label{display:block;font-size:.83rem;color:#374151;margin-bottom:3px;margin-top:12px}
select,input,textarea{width:100%;padding:8px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:.95rem;background:#fff}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ind-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.ind-card{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px}
.ind-card h3{font-size:.88rem;font-weight:600;color:#374151;margin-bottom:4px}
.ind-meta{font-size:.78rem;color:#94a3b8;margin-bottom:10px}
.ind-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.ind-label{font-size:.8rem;color:#64748b;width:80px;flex-shrink:0}
.ind-input{flex:1}
.ind-input input{padding:6px 8px;font-size:.88rem}
.pct{padding:3px 8px;border-radius:12px;font-size:.75rem;font-weight:700}
.pct-ok{background:#dcfce7;color:#166534}
.pct-warn{background:#fef9c3;color:#854d0e}
.pct-bad{background:#fee2e2;color:#991b1b}
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{background:#f8fafc;padding:10px 12px;text-align:left;font-weight:600;color:#64748b;border-bottom:2px solid #e2e8f0}
td{padding:9px 12px;border-bottom:1px solid #f1f5f9}
tr:hover td{background:#f8fafc}
.msg{padding:10px 14px;border-radius:6px;margin-top:12px;font-size:.9rem}
.msg.ok{background:#dcfce7;color:#166534}
.msg.err{background:#fee2e2;color:#991b1b}
.empty{text-align:center;color:#94a3b8;padding:40px 0}
.loading{text-align:center;padding:40px;color:#94a3b8}
.equipe-selector{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.eq-btn{padding:6px 16px;border-radius:20px;border:1px solid #e2e8f0;background:#fff;cursor:pointer;font-size:.85rem;color:#64748b}
.eq-btn.active{background:#7c3aed;color:#fff;border-color:#7c3aed}
</style>
</head>
<body>
<header>
  <div style="display:flex;align-items:center">
    <h1>Indicadores Operacionais</h1>
    <span class="badge-role">Analista</span>
  </div>
  <button class="btn btn-outline" onclick="sair()">Sair</button>
</header>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="aba('lancar',this)">Lançar indicadores</button>
    <button class="tab" onclick="aba('historico',this)">Histórico</button>
  </div>

  <!-- LANÇAR -->
  <div id="lancar" class="section active">
    <div class="card">
      <h2>Período e equipe</h2>
      <div class="grid2">
        <div>
          <label>Período</label>
          <input type="month" id="periodo"/>
        </div>
        <div>
          <label>Equipe</label>
          <select id="equipe">
            <option value="Cond21">Cond21</option>
            <option value="GC">GC</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" style="margin-top:14px;width:auto;padding:9px 20px" onclick="carregarIndicadores()">Carregar indicadores</button>
    </div>
    <div id="indArea"></div>
    <div id="msgLancar"></div>
  </div>

  <!-- HISTÓRICO -->
  <div id="historico" class="section">
    <div class="card">
      <h2>Filtros</h2>
      <div class="grid2">
        <div>
          <label>Equipe</label>
          <select id="filtroEquipe">
            <option value="">Todas</option>
            <option value="Cond21">Cond21</option>
            <option value="GC">GC</option>
          </select>
        </div>
        <div>
          <label>Período</label>
          <input type="month" id="filtroPeriodo"/>
        </div>
      </div>
      <button class="btn btn-primary" style="margin-top:14px;width:auto;padding:9px 20px" onclick="carregarHistorico()">Filtrar</button>
    </div>
    <div id="histArea"><div class="empty">Use os filtros acima para carregar o histórico.</div></div>
  </div>
</div>

<script>
const sb = supabase.createClient('https://zsfysyphhpsajxbkwywk.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZnlzeXBoaHBzYWp4Ymt3eXdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNDk3MTIsImV4cCI6MjA5NzgyNTcxMn0.wkfGIhB0YxN-VM_m1s7N1d-HIg2uK9C1FFBDmvcYfL0');
let ANALISTA = null;
let indicadoresMeta = [];
let valoresAtuais = {};

function aba(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
}

async function carregarIndicadores() {
  const periodo = document.getElementById('periodo').value;
  const equipe = document.getElementById('equipe').value;
  const area = document.getElementById('indArea');
  if (!periodo) { area.innerHTML = '<div class="msg err">Selecione o período.</div>'; return; }
  area.innerHTML = '<div class="loading">Carregando indicadores...</div>';

  // Buscar definições de indicadores
  const {data: inds, error} = await sb.from('indicadores').select('*').order('nome');
  if (error || !inds?.length) { area.innerHTML = '<div class="msg err">Erro ao carregar indicadores: ' + (error?.message||'sem dados') + '</div>'; return; }
  indicadoresMeta = inds;

  // Buscar valores já lançados para este período/equipe
  const {data: regs} = await sb.from('registros_indicadores')
    .select('*').eq('periodo', periodo + '-01').eq('equipe', equipe);
  valoresAtuais = {};
  (regs||[]).forEach(r => { valoresAtuais[r.indicador_id] = r; });

  // Renderizar
  area.innerHTML = '<div class="card"><h2>Indicadores — ' + equipe + ' — ' + periodo + '</h2>' +
    '<div class="ind-grid">' +
    inds.map(ind => {
      const reg = valoresAtuais[ind.id];
      const realizado = reg?.realizado ?? '';
      const meta = ind.meta_padrao ?? '';
      return '<div class="ind-card">' +
        '<h3>' + ind.nome + '</h3>' +
        '<div class="ind-meta">Meta padrão: ' + (meta !== '' ? meta : '—') + '</div>' +
        '<div class="ind-row"><span class="ind-label">Meta</span>' +
        '<div class="ind-input"><input type="number" id="meta_' + ind.id + '" placeholder="Meta" value="' + meta + '" step="any"/></div></div>' +
        '<div class="ind-row"><span class="ind-label">Realizado</span>' +
        '<div class="ind-input"><input type="number" id="real_' + ind.id + '" placeholder="Realizado" value="' + realizado + '" step="any"/></div></div>' +
        '</div>';
    }).join('') +
    '</div>' +
    '<button class="btn btn-primary" style="margin-top:20px;padding:11px 24px" onclick="salvarIndicadores()">Salvar lançamento</button>' +
    '</div>';
}

async function salvarIndicadores() {
  const periodo = document.getElementById('periodo').value;
  const equipe = document.getElementById('equipe').value;
  const msg = document.getElementById('msgLancar');
  msg.className = '';
  msg.textContent = '';

  const registros = indicadoresMeta.map(ind => {
    const metaEl = document.getElementById('meta_' + ind.id);
    const realEl = document.getElementById('real_' + ind.id);
    return {
      indicador_id: ind.id,
      equipe,
      periodo: periodo + '-01',
      meta: metaEl?.value !== '' ? parseFloat(metaEl.value) : null,
      realizado: realEl?.value !== '' ? parseFloat(realEl.value) : null,
      lancado_por: ANALISTA.id
    };
  }).filter(r => r.realizado !== null);

  if (!registros.length) { msg.textContent = 'Preencha ao menos um valor realizado.'; msg.className = 'msg err'; return; }

  // Upsert (atualiza se já existe, insere se não)
  const {error} = await sb.from('registros_indicadores').upsert(registros, {
    onConflict: 'indicador_id,equipe,periodo'
  });

  if (error) { msg.textContent = 'Erro: ' + error.message; msg.className = 'msg err'; }
  else { msg.textContent = '✓ ' + registros.length + ' indicadores salvos com sucesso!'; msg.className = 'msg ok'; }
}

async function carregarHistorico() {
  const equipe = document.getElementById('filtroEquipe').value;
  const periodo = document.getElementById('filtroPeriodo').value;
  const area = document.getElementById('histArea');
  area.innerHTML = '<div class="loading">Carregando...</div>';

  let q = sb.from('registros_indicadores')
    .select('*, indicadores(nome, meta_padrao)')
    .order('periodo', {ascending: false})
    .order('equipe');
  if (equipe) q = q.eq('equipe', equipe);
  if (periodo) q = q.eq('periodo', periodo + '-01');

  const {data, error} = await q;
  if (error || !data?.length) { area.innerHTML = '<div class="empty">Nenhum lançamento encontrado.</div>'; return; }

  // Agrupar por período + equipe
  const grupos = {};
  data.forEach(r => {
    const key = (r.periodo?.substring(0,7)||'') + '_' + r.equipe;
    if (!grupos[key]) grupos[key] = {periodo: r.periodo?.substring(0,7), equipe: r.equipe, itens: []};
    grupos[key].itens.push(r);
  });

  area.innerHTML = Object.values(grupos).map(g => {
    const rows = g.itens.map(r => {
      const pct = r.meta && r.realizado !== null ? (r.realizado / r.meta * 100).toFixed(0) : null;
      const cls = pct === null ? '' : pct >= 100 ? 'pct-ok' : pct >= 80 ? 'pct-warn' : 'pct-bad';
      return '<tr><td>' + (r.indicadores?.nome||r.indicador_id) + '</td>' +
        '<td>' + (r.meta ?? '—') + '</td>' +
        '<td>' + (r.realizado ?? '—') + '</td>' +
        '<td>' + (pct !== null ? '<span class="pct ' + cls + '">' + pct + '%</span>' : '—') + '</td></tr>';
    }).join('');
    return '<div class="card"><h2>' + g.equipe + ' — ' + g.periodo + '</h2>' +
      '<div class="table-wrap"><table><thead><tr><th>Indicador</th><th>Meta</th><th>Realizado</th><th>Atingimento</th></tr></thead>' +
      '<tbody>' + rows + '</tbody></table></div></div>';
  }).join('');
}

function sair() { sb.auth.signOut().then(() => location.href = 'index.html'); }

(async () => {
  const {data:{session}} = await sb.auth.getSession();
  if (!session) { location.href = 'index.html'; return; }
  ANALISTA = session.user;
  const {data:p} = await sb.from('perfis').select('papel').eq('id', ANALISTA.id).single();
  if (!p || (p.papel !== 'analista' && p.papel !== 'gestor')) {
    location.href = 'colaborador-autoavaliacao.html'; return;
  }
  // Pré-preencher período com mês atual
  const hoje = new Date();
  document.getElementById('periodo').value = hoje.getFullYear() + '-' + String(hoje.getMonth()+1).padStart(2,'0');
  document.getElementById('filtroPeriodo').value = hoje.getFullYear() + '-' + String(hoje.getMonth()+1).padStart(2,'0');
})();
</script>
</body>
</html>
