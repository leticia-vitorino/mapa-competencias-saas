<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>Competencias SaaS</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>*{box-sizing:border-box;margin:0;padding:0;}body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;display:flex;justify-content:center;align-items:center;min-height:100vh;}.box{background:#fff;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1);padding:40px;width:100%;max-width:400px;}h1{color:#2563eb;font-size:1.4rem;margin-bottom:6px;}p{color:#64748b;font-size:.9rem;margin-bottom:24px;}label{display:block;font-size:.85rem;color:#64748b;margin-bottom:4px;margin-top:14px;}input{width:100%;padding:10px 12px;border:1px solid #cbd5e1;border-radius:6px;font-size:.9rem;}.btn{width:100%;padding:12px;background:#2563eb;color:#fff;border:none;border-radius:6px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:20px;}.btn:hover{background:#1d4ed8;}.erro{color:#dc2626;font-size:.85rem;margin-top:10px;display:none;}</style>
</head><body>
<div class="box"><h1>Competencias SaaS</h1><p>Entre com seu e-mail e senha.</p><label>E-mail</label><input type="email" id="email" placeholder="seu@email.com"/><label>Senha</label><input type="password" id="senha"/><button class="btn" onclick="entrar()">Entrar</button><div class="erro" id="erro"></div></div>
<script>
const sb=supabase.createClient('https://zsfysyphhpsajxbkwywk.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZnlzeXBoaHBzYWp4Ymt3eXdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNDk3MTIsImV4cCI6MjA5NzgyNTcxMn0.wkfGIhB0YxN-VM_m1s7N1d-HIg2uK9C1FFBDmvcYfL0');
async function entrar(){const e=document.getElementById('email').value.trim(),s=document.getElementById('senha').value,er=document.getElementById('erro');er.style.display='none';if(!e||!s){er.textContent='Preencha os campos.';er.style.display='block';return;}const{data,error}=await sb.auth.signInWithPassword({email:e,password:s});if(error){er.textContent=error.message;er.style.display='block';return;}const{data:p}=await sb.from('perfis').select('papel').eq('id',data.user.id).single();location.href=p?.papel==='gestor'?'gestor-painel.html':'colaborador-autoavaliacao.html';}
document.addEventListener('keydown',e=>{if(e.key==='Enter')entrar();});
(async()=>{const{data:{session}}=await sb.auth.getSession();if(session){const{data:p}=await sb.from('perfis').select('papel').eq('id',session.user.id).single();if(p?.papel==='gestor')location.href='gestor-painel.html';else if(p)location.href='colaborador-autoavaliacao.html';}})();
</script></body></html>
