<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Painel do Gestor</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b}
header{background:#2563eb;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:1.1rem}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.88rem}
.btn-outline{background:transparent;border:1px solid #fff;color:#fff}
.btn-primary{background:#2563eb;color:#fff;font-weight:600}
.btn-primary:hover{background:#1d4ed8}
.btn-sm{padding:4px 10px;font-size:.8rem}
.btn-red{background:#dc2626;color:#fff}
.btn-yellow{background:#d97706;color:#fff}
.container{max-width:1100px;margin:0 auto;padding:20px 16px}
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid #e2e8f0}
.tab{padding:9px 18px;cursor:pointer;border:none;background:none;font-size:.9rem;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:600}
.section{display:none}.section.active{display:block}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:18px;margin-bottom:14px}
.card h2{font-size:.85rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
label{display:block;font-size:.83rem;color:#374151;margin-bottom:3px;margin-top:12px}
input,select{width:100%;padding:8px 10px;border:1.5px solid #e2e8f0;border-radius:6px;font-size:.9rem;outline:none}
input:focus,select:focus{border-color:#2563eb}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.msg{margin-top:10px;padding:9px 12px;border-radius:6px;font-size:.85rem;display:none}
.msg.ok{background:#d1fae5;color:#065f46;display:block}
.msg.err{background:#fee2e2;color:#991b1b;display:block}
table{width:100%;border-collapse:collapse;font-size:.88rem}
th{background:#f8fafc;padding:10px 12px;text-align:left;font-size:.8rem;color:#64748b;text-transform:uppercase;border-bottom:2px solid #e2e8f0}
td{padding:10px 12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
tr:hover td{background:#f8fafc}
.badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:.75rem;font-weight:600}
.badge-gestor{background:#dbeafe;color:#1d4ed8}
.badge-n1{background:#d1fae5;color:#065f46}
.badge-n2{background:#fef3c7;color:#92400e}
.badge-analista_op{background:#ede9fe;color:#5b21b6}
.acoes{display:flex;gap:6px}
/* Modal de Edicao */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;padding:24px;width:100%;max-width:460px;box-shadow:0 8px 30px rgba(0,0,0,.2)}
.modal h3{font-size:1rem;margin-bottom:16px;color:#1e293b}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}
</style>
</head>
<body>
<header>
<h1>Painel do Gestor</h1>
<button class="btn btn-outline" onclick="sair()">Sair</button>
</header>
<div class="container">
<div class="tabs">
<button class="tab active" onclick="aba('equipe',this)">Equipe</button>
<button class="tab" onclick="aba('avaliacoes',this)">Avaliacoes</button>
<button class="tab" onclick="aba('indicadores',this)">Indicadores</button>
<button class="tab" onclick="aba('pdi',this)">PDI</button>
</div>
<div id="equipe" class="section active">
<div class="card">
<h2>Adicionar Membro</h2>
<div class="form-row">
<div><label>E-mail</label><input type="email" id="novoEmail" placeholder="colaborador@email.com"/></div>
<div><label>Nome</label><input type="text" id="novoNome" placeholder="Nome completo"/></div>
</div>
<div class="form-row">
<div><label>Equipe</label>
<select id="novaEquipe">
<option value="Cond21">Cond21</option>
<option value="GC">GC</option>
<option value="Ambas">Ambas (Cond21 + GC)</option>
</select></div>
<div><label>Nivel / Papel</label>
<select id="novoPapel">
<option value="n1">N1 - Suporte Nivel 1</option>
<option value="n2">N2 - Suporte Nivel 2</option>
<option value="analista_op">Analista Operacional</option>
<option value="gestor">Gestor</option>
</select></div>
</div>
<button class="btn btn-primary" style="margin-top:14px" onclick="adicionarMembro()">Adicionar</button>
<div class="msg" id="msgEquipe"></div>
</div>
<div class="card">
<h2>Membros da Equipe</h2>
<table><thead><tr><th>Nome / E-mail</th><th>Equipe</th><th>Nivel</th><th>Acoes</th></tr></thead>
<tbody id="listaEquipe"><tr><td colspan="4" style="text-align:center;color:#94a3b8">Carregando...</td></tr></tbody>
</table>
</div>
</div>
<div id="avaliacoes" class="section">
<div class="card"><h2>Avaliacoes da Equipe</h2><p style="color:#64748b;font-size:.9rem">Em breve.</p></div>
</div>
<div id="indicadores" class="section">
<div class="card"><h2>Indicadores Operacionais</h2><p style="color:#64748b;font-size:.9rem">Em breve.</p></div>
</div>
<div id="pdi" class="section">
<div class="card"><h2>Plano de Desenvolvimento</h2><p style="color:#64748b;font-size:.9rem">Em breve.</p></div>
</div>
</div>

<!-- Modal Editar Membro -->
<div class="modal-overlay" id="modalEditar">
<div class="modal">
<h3>Editar Membro</h3>
<input type="hidden" id="editId"/>
<label>Nome</label>
<input type="text" id="editNome"/>
<label>E-mail</label>
<input type="email" id="editEmail"/>
<label>Equipe</label>
<select id="editEquipe">
<option value="Cond21">Cond21</option>
<option value="GC">GC</option>
<option value="Ambas">Ambas (Cond21 + GC)</option>
</select>
<label>Nivel / Papel</label>
<select id="editPapel">
<option value="n1">N1 - Suporte Nivel 1</option>
<option value="n2">N2 - Suporte Nivel 2</option>
<option value="analista_op">Analista Operacional</option>
<option value="gestor">Gestor</option>
</select>
<div class="modal-footer">
<button class="btn" style="background:#e2e8f0;color:#374151" onclick="fecharModal()">Cancelar</button>
<button class="btn btn-primary" onclick="salvarEdicao()">Salvar</button>
</div>
<div class="msg" id="msgEditar"></div>
</div>
</div>

<script>
const SURL='https://zsfysyphhpsajxbkwywk.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZnlzeXBoaHBzYWp4Ymt3eXdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNDk3MTIsImV4cCI6MjA5NzgyNTcxMn0.wkfGIhB0YxN-VM_m1s7N1d-HIg2uK9C1FFBDmvcYfL0';
const sb=supabase.createClient(SURL,SKEY);
function showMsg(id,txt,tipo){const m=document.getElementById(id);m.textContent=txt;m.className='msg '+tipo;}
function aba(nome,el){document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById(nome).classList.add('active');el.classList.add('active');}
function badgePapel(p){const l={gestor:'Gestor',n1:'N1',n2:'N2',analista_op:'Analista Op.'};return '<span class="badge badge-'+p+'">'+(l[p]||p)+'</span>';}
async function carregarEquipe(){const{data,error}=await sb.from('perfis').select('*').order('nome');if(error)return;const tb=document.getElementById('listaEquipe');if(!data||!data.length){tb.innerHTML='<tr><td colspan="4" style="text-align:center;color:#94a3b8">Nenhum membro</td></tr>';return;}tb.innerHTML=data.map(m=>'<tr><td><strong>'+(m.nome||m.email)+'</strong><br><small style="color:#64748b">'+m.email+'</small></td><td>'+(m.equipe||'&mdash;')+'</td><td>'+badgePapel(m.papel)+'</td><td><div class="acoes"><button class="btn btn-sm btn-yellow" onclick="abrirEdicao('+JSON.stringify(m)+')">Editar</button><button class="btn btn-sm btn-red" onclick="removerMembro('+JSON.stringify(m.id)+')">Remover</button></div></td></tr>').join('');}
async function adicionarMembro(){const email=document.getElementById('novoEmail').value.trim();const nome=document.getElementById('novoNome').value.trim();const equipe=document.getElementById('novaEquipe').value;const papel=document.getElementById('novoPapel').value;if(!email||!nome){showMsg('msgEquipe','Preencha e-mail e nome.','err');return;}const{error}=await sb.from('perfis').upsert({email,nome,equipe,papel},{onConflict:'email'});if(error){showMsg('msgEquipe','Erro: '+error.message,'err');}else{showMsg('msgEquipe','Membro adicionado! Peca para ele criar conta no app com este e-mail.','ok');carregarEquipe();document.getElementById('novoEmail').value='';document.getElementById('novoNome').value='';}}
function abrirEdicao(m){document.getElementById('editId').value=m.id;document.getElementById('editNome').value=m.nome||'';document.getElementById('editEmail').value=m.email||'';document.getElementById('editEquipe').value=m.equipe||'Cond21';document.getElementById('editPapel').value=m.papel||'n1';document.getElementById('msgEditar').className='msg';document.getElementById('modalEditar').classList.add('open');}
function fecharModal(){document.getElementById('modalEditar').classList.remove('open');}
async function salvarEdicao(){const id=document.getElementById('editId').value;const nome=document.getElementById('editNome').value.trim();const email=document.getElementById('editEmail').value.trim();const equipe=document.getElementById('editEquipe').value;const papel=document.getElementById('editPapel').value;if(!email||!nome){showMsg('msgEditar','Preencha todos os campos.','err');return;}const{error}=await sb.from('perfis').update({nome,email,equipe,papel}).eq('id',id);if(error){showMsg('msgEditar','Erro: '+error.message,'err');}else{fecharModal();carregarEquipe();}}
async function removerMembro(id){if(!confirm('Remover este membro?'))return;const{error}=await sb.from('perfis').delete().eq('id',id);if(error)alert('Erro ao remover: '+error.message);else carregarEquipe();}
async function sair(){await sb.auth.signOut();location.href='index.html';}
async function init(){const{data:{session}}=await sb.auth.getSession();if(!session){location.href='index.html';return;}carregarEquipe();}
init();
</script>
</body>
           </html>
