<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Minha Autoavaliação</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#f1f5f9;color:#1e293b}
header{background:#2563eb;color:#fff;padding:14px 24px;display:flex;justify-content:space-between;align-items:center}
header h1{font-size:1.1rem}
.btn{padding:7px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.88rem}
.btn-outline{background:transparent;border:1px solid #fff;color:#fff}
.container{max-width:900px;margin:0 auto;padding:20px 16px}
.tabs{display:flex;gap:2px;margin-bottom:20px;border-bottom:2px solid #e2e8f0}
.tab{padding:9px 18px;cursor:pointer;border:none;background:none;font-size:.9rem;color:#64748b;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.active{color:#2563eb;border-bottom-color:#2563eb;font-weight:600}
.section{display:none}.section.active{display:block}
.card{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.08);padding:18px;margin-bottom:14px}
.card h2{font-size:.85rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em;margin-bottom:12px}
label{display:block;font-size:.83rem;color:#374151;margin-bottom:3px;margin-top:14px}
select,input,textarea{width:100%;padding:8px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:.95rem;background:#fff}
.comp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;margin-top:8px}
.comp-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:12px}
.comp-item label{font-size:.82rem;font-weight:600;color:#374151;margin:0 0 8px 0}
.stars{display:flex;gap:4px;margin-top:6px}
.star{font-size:1.4rem;cursor:pointer;color:#d1d5db;transition:color .15s}
.star.on{color:#f59e0b}
.btn-primary{background:#2563eb;color:#fff;font-weight:600;padding:11px;width:100%;margin-top:20px}
.btn-primary:hover{background:#1d4ed8}
.msg{padding:10px 14px;border-radius:6px;margin-top:12px;font-size:.9rem;display:none}
.msg.ok{background:#dcfce7;color:#166534;display:block}
.msg.err{background:#fee2e2;color:#991b1b;display:block}
.hist-item{background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;padding:14px;margin-bottom:10px}
.hist-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hist-periodo{font-weight:600;color:#2563eb}
.hist-media{background:#dbeafe;color:#1e40af;padding:3px 10px;border-radius:12px;font-size:.82rem;font-weight:600}
.comp-bars{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;margin-top:8px}
.comp-bar{font-size:.8rem}
.bar-label{display:flex;justify-content:space-between;margin-bottom:2px;color:#64748b}
.bar-bg{background:#e2e8f0;border-radius:4px;height:6px}
.bar-fill{background:#2563eb;border-radius:4px;height:6px;transition:width .3s}
.empty{text-align:center;color:#94a3b8;padding:40px 0;font-size:.95rem}
.loading{text-align:center;padding:40px;color:#94a3b8}
</style>
</head>
<body>
<header>
  <h1>Minha Autoavaliação</h1>
  <button class="btn btn-outline" onclick="sair()">Sair</button>
</header>
<div class="container">
  <div class="tabs">
    <button class="tab active" onclick="aba('nova',this)">Nova avaliação</button>
    <button class="tab" onclick="aba('historico',this)">Meu histórico</button>
    <button class="tab" onclick="aba('pdi',this)">Meu PDI</button>
  </div>
  <div id="nova" class="section active">
    <div class="card">
      <h2>Período</h2>
      <input type="month" id="periodo" style="max-width:220px"/>
      <p style="margin-top:8px;font-size:.82rem;color:#64748b">Avalie cada competência de 1 a 5. Respostas são confidenciais para o gestor.</p>
    </div>
    <div class="card">
      <h2>Competências</h2>
      <div class="comp-grid" id="compGrid"></div>
    </div>
    <div class="card">
      <h2>Comentário (opcional)</h2>
      <textarea id="comentario" rows="3" placeholder="Algo sobre este período..."></textarea>
    </div>
    <button class="btn btn-primary" onclick="enviar()">Enviar autoavaliação</button>
    <div id="msg" class="msg"></div>
  </div>
  <div id="historico" class="section">
    <div id="histLista"><div class="loading">Carregando...</div></div>
  </div>
  <div id="pdi" class="section">
    <div id="pdiLista"><div class="loading">Carregando...</div></div>
  </div>
</div>
<script>
const sb = supabase.createClient('https://zsfysyphhpsajxbkwywk.supabase.co','eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpzZnlzeXBoaHBzYWp4Ymt3eXdrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyNDk3MTIsImV4cCI6MjA5NzgyNTcxMn0.wkfGIhB0YxN-VM_m1s7N1d-HIg2uK9C1FFBDmvcYfL0');
const COMPS = [
  {id:'C1',nome:'Conhecimento do produto'},
  {id:'C2',nome:'Escuta ativa'},
  {id:'C3',nome:'Comunicação consultiva'},
  {id:'C4',nome:'Gestão do relacionamento'},
  {id:'C5',nome:'Resolução de problemas'},
  {id:'C6',nome:'Organização e tempo'},
  {id:'C7',nome:'Colaboração em equipe'},
  {id:'C8',nome:'Adaptabilidade'}
];
let USER = null;
let notas = {};

// Init stars
function buildStars() {
  const g = document.getElementById('compGrid');
  g.innerHTML = '';
  COMPS.forEach(c => {
    notas[c.id] = 0;
    const div = document.createElement('div');
    div.className = 'comp-item';
    div.innerHTML = '<label>' + c.nome + '</label><div class="stars" id="s_' + c.id + '">' +
      [1,2,3,4,5].map(n => '<span class="star" data-c="' + c.id + '" data-n="' + n + '" onclick="setNota(\''+c.id+'\','+n+')">★</span>').join('') +
      '</div>';
    g.appendChild(div);
  });
}

function setNota(cid, n) {
  notas[cid] = n;
  document.querySelectorAll('#s_' + cid + ' .star').forEach((s,i) => {
    s.classList.toggle('on', i < n);
  });
}

function aba(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (id === 'historico') carregarHistorico();
  if (id === 'pdi') carregarPDI();
}

async function enviar() {
  const periodo = document.getElementById('periodo').value;
  const comentario = document.getElementById('comentario').value;
  const msg = document.getElementById('msg');
  msg.className = 'msg';
  msg.style.display = 'none';
  if (!periodo) { msg.textContent = 'Selecione o período.'; msg.className = 'msg err'; return; }
  const vazias = COMPS.filter(c => !notas[c.id]);
  if (vazias.length) { msg.textContent = 'Avalie todas as competências.'; msg.className = 'msg err'; return; }
  const notasArr = COMPS.map(c => ({competencia_id: c.id, nota: notas[c.id]}));
  const {error} = await sb.from('autoavaliacoes').insert({
    colaborador_id: USER.id,
    periodo: periodo + '-01',
    notas: notasArr,
    comentario: comentario || null
  });
  if (error) { msg.textContent = 'Erro: ' + error.message; msg.className = 'msg err'; }
  else { msg.textContent = 'Autoavaliação enviada com sucesso!'; msg.className = 'msg ok'; notas = {}; buildStars(); }
}

async function carregarHistorico() {
  const el = document.getElementById('histLista');
  el.innerHTML = '<div class="loading">Carregando...</div>';
  const {data, error} = await sb.from('autoavaliacoes')
    .select('*').eq('colaborador_id', USER.id).order('periodo', {ascending: false});
  if (error || !data?.length) { el.innerHTML = '<div class="empty">Nenhuma autoavaliação ainda.</div>'; return; }
  el.innerHTML = data.map(r => {
    const notas = r.notas || [];
    const media = notas.length ? (notas.reduce((a,b) => a + b.nota, 0) / notas.length).toFixed(1) : '-';
    const bars = notas.map(n => {
      const nome = COMPS.find(c => c.id === n.competencia_id)?.nome || n.competencia_id;
      return '<div class="comp-bar"><div class="bar-label"><span>' + nome + '</span><span>' + n.nota + '/5</span></div>' +
        '<div class="bar-bg"><div class="bar-fill" style="width:' + (n.nota/5*100) + '%"></div></div></div>';
    }).join('');
    return '<div class="hist-item"><div class="hist-header"><span class="hist-periodo">' +
      r.periodo?.substring(0,7) + '</span><span class="hist-media">Média: ' + media + '</span></div>' +
      '<div class="comp-bars">' + bars + '</div>' +
      (r.comentario ? '<p style="margin-top:10px;font-size:.85rem;color:#64748b">' + r.comentario + '</p>' : '') +
      '</div>';
  }).join('');
}

async function carregarPDI() {
  const el = document.getElementById('pdiLista');
  el.innerHTML = '<div class="loading">Carregando...</div>';
  const {data, error} = await sb.from('pdis')
    .select('*').eq('colaborador_id', USER.id).order('criado_em', {ascending: false});
  if (error || !data?.length) { el.innerHTML = '<div class="empty">Nenhum PDI cadastrado pelo gestor ainda.</div>'; return; }
  el.innerHTML = data.map(p => '<div class="hist-item"><b>' + (p.titulo||'PDI') + '</b>' +
    (p.descricao ? '<p style="margin-top:6px;font-size:.88rem">' + p.descricao + '</p>' : '') +
    '</div>').join('');
}

function sair() { sb.auth.signOut().then(() => location.href='index.html'); }

(async () => {
  const {data:{session}} = await sb.auth.getSession();
  if (!session) { location.href = 'index.html'; return; }
  USER = session.user;
  const {data:p} = await sb.from('perfis').select('papel').eq('id', USER.id).single();
  if (p?.papel === 'gestor') { location.href = 'gestor-painel.html'; return; }
  buildStars();
  const hoje = new Date();
  document.getElementById('periodo').value = hoje.getFullYear() + '-' + String(hoje.getMonth()+1).padStart(2,'0');
})();
</script>
</body>
</html>
